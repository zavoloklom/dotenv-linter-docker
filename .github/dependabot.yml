version: 2
updates:
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    allow:
      - dependency-type: direct
        dependency-name: alpine
      - dependency-type: direct
        dependency-name: busybox
  - package-ecosystem: github-actions
    directory: /
    commit-message:
      prefix: ci(deps)
    schedule:
      interval: weekly
