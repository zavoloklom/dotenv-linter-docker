name: PR Validation

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Validate Taskfile
        run: task --list

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          recursive: true

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v1
        with:
          globs: |
            **/*.md
            !CHANGELOG.md

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set build arguments
        uses: ./.github/actions/set-build-args

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Build Alpine version (multi-platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          build-args: |
            DOTENV_LINTER_VERSION=${{ env.DOTENV_LINTER_VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILD_REVISION=${{ env.BUILD_REVISION }}
          target: alpine-version

      - name: Build BusyBox version (multi-platform)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          build-args: |
            DOTENV_LINTER_VERSION=${{ env.DOTENV_LINTER_VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILD_REVISION=${{ env.BUILD_REVISION }}
          target: busybox-version

      - name: Load Alpine image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: dotenv-linter:smoke-alpine
          build-args: |
            DOTENV_LINTER_VERSION=${{ env.DOTENV_LINTER_VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILD_REVISION=${{ env.BUILD_REVISION }}
          target: alpine-version

      - name: Smoke test Alpine image
        run: docker run --rm dotenv-linter:smoke-alpine --version

      - name: Load BusyBox image for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: dotenv-linter:smoke-busybox
          build-args: |
            DOTENV_LINTER_VERSION=${{ env.DOTENV_LINTER_VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILD_REVISION=${{ env.BUILD_REVISION }}
          target: busybox-version

      - name: Smoke test BusyBox image
        run: docker run --rm dotenv-linter:smoke-busybox --version
