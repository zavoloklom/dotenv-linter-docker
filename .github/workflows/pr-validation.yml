name: PR Validation

on:
  pull_request:
    branches:
      - main

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Validate Taskfile
        run: task --list

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          recursive: true

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@ea5cc041bf75e8f2ee60db4a68b86254cec9fcd8 # v1
        with:
          globs: |
            **/*.md
            !CHANGELOG.md

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set build arguments
        uses: ./.github/actions/set-build-args

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          install: true

      - name: Build Alpine version (multi-platform)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          build-args: |
            DOTENV_LINTER_VERSION=${{ env.DOTENV_LINTER_VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILD_REVISION=${{ env.BUILD_REVISION }}
          target: alpine-version

      - name: Build BusyBox version (multi-platform)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          platforms: linux/amd64,linux/arm64
          build-args: |
            DOTENV_LINTER_VERSION=${{ env.DOTENV_LINTER_VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILD_REVISION=${{ env.BUILD_REVISION }}
          target: busybox-version

      - name: Load Alpine image for smoke test
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: dotenv-linter:smoke-alpine
          build-args: |
            DOTENV_LINTER_VERSION=${{ env.DOTENV_LINTER_VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILD_REVISION=${{ env.BUILD_REVISION }}
          target: alpine-version

      - name: Smoke test Alpine image
        run: docker run --rm dotenv-linter:smoke-alpine --version

      - name: Load BusyBox image for smoke test
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: dotenv-linter:smoke-busybox
          build-args: |
            DOTENV_LINTER_VERSION=${{ env.DOTENV_LINTER_VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
            BUILD_REVISION=${{ env.BUILD_REVISION }}
          target: busybox-version

      - name: Smoke test BusyBox image
        run: docker run --rm dotenv-linter:smoke-busybox --version
